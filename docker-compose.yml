services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dmarc-dashboard:test
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      SESSION_DRIVER: database
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      RUN_MIGRATIONS: "true"
    volumes:
      - dmarc_storage:/var/www/html/storage
      - dmarc_database:/var/www/html/database

  scheduler:
    image: dmarc-dashboard:test
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      SESSION_DRIVER: database
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      RUN_MIGRATIONS: "false"
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - dmarc_storage:/var/www/html/storage
      - dmarc_database:/var/www/html/database

  queue:
    image: dmarc-dashboard:test
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      SESSION_DRIVER: database
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      RUN_MIGRATIONS: "false"
    command: ["php", "artisan", "queue:work", "--verbose", "--tries=1", "--timeout=0"]
    volumes:
      - dmarc_storage:/var/www/html/storage
      - dmarc_database:/var/www/html/database

volumes:
  dmarc_storage:
  dmarc_database:

